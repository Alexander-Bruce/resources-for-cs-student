<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <h2 class="mt-5 text-center">产品列表</h2>

    <div class="d-flex justify-content-between align-items-center">
        <h3>欢迎, <span id="usernameDisplay"></span></h3>
        <a href="/static/orders.html" class="btn btn-success float-end">查看订单</a> <!-- 跳转到订单页面 -->
    </div>

    <table class="table table-striped mt-4">
        <thead>
        <tr>
            <th>Product ID</th>
            <th>Product Name</th>
            <th>Price</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody id="productTableBody">
        </tbody>
    </table>
</div>

<script>
    var username = localStorage.getItem("username");

    if (username) {
        document.getElementById('usernameDisplay').textContent = username;

        fetch('/products', {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json',
            }
        })
            .then(response => response.json())
            .then(data => {
                if (data && data.length > 0) {
                    const productTableBody = document.getElementById('productTableBody');
                    productTableBody.innerHTML = '';

                    data.forEach(product => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                        <td>${product.id}</td>
                        <td>${product.productName}</td>
                        <td>${product.price}</td>
                        <td>
                            <button class="btn btn-primary" onclick="addToOrder('${username}', ${product.id})">添加到订单</button>
                        </td>
                    `;
                        productTableBody.appendChild(row);
                    });
                } else {
                    alert("没有找到产品。");
                }
            })
            .catch(error => {
                console.error('Error fetching products:', error);
                alert("获取产品失败，请重试。");
            });
    } else {
        alert('未找到用户名，您可能需要重新登录。');
        window.location.href = '/login';
    }

    function addToOrder(username, productId) {
        fetch('/order/add', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ username: username, productId: productId })
        })
            .then(response => {
                if (response.ok) {
                    alert('已成功添加到订单');
                } else {
                    alert('添加到订单失败');
                }
            })
            .catch(error => {
                console.error('Error adding product to order:', error);
                alert('添加到订单失败，请重试。');
            });
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
