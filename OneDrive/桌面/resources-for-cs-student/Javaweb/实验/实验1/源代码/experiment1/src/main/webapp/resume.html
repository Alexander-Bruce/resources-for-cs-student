<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简历表单</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            font-size: 1rem;
            color: #555;
        }

        input[type="text"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }

        .form-group {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>个人简历</h2>
    <form action="GetResume" method="post">
        <div class="form-group">
            <label for="name">姓名:</label><br>
            <input type="text" id="name" name="name" required><br>
        </div>

        <div class="form-group">
            <label for="dob">生日:</label><br>
            <input type="date" id="dob" name="dob" required><br>
        </div>

        <div class="form-group">
            <label for="school">毕业院校:</label><br>
            <input type="text" id="school" name="school" required><br>
        </div>

        <div class="form-group">
            <label for="summary">个人简介:</label><br>
            <textarea id="summary" name="summary" rows="5" cols="30" required></textarea><br>
        </div>

        <input type="submit" value="提交信息">
    </form>
</div>

</body>
</html>
